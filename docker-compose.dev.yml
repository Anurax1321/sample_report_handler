services:
  db:
    image: postgres:16-alpine
    container_name: sample-report-db-dev
    environment:
      - POSTGRES_USER=sample_user
      - POSTGRES_PASSWORD=sample_pass
      - POSTGRES_DB=sample_report_db
    ports:
      - "5434:5432"
    volumes:
      - postgres-data-dev:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sample_user -d sample_report_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sample-report-backend-dev
    ports:
      - "8002:8000"
    environment:
      - CORS_ORIGINS=http://localhost:5175
      - SQLALCHEMY_DATABASE_URI=postgresql://sample_user:sample_pass@db:5432/sample_report_db
    volumes:
      - ./backend:/app
      - backend-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: sample-report-frontend-dev
    ports:
      - "5175:5173"
    environment:
      - VITE_API_URL=http://localhost:8002
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data-dev:
    driver: local
  backend-uploads:
    driver: local
