services:
  db:
    image: postgres:16-alpine
    container_name: sample-report-db-prod
    environment:
      - POSTGRES_USER=${DB_USER:-sample_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-changeme_in_production}
      - POSTGRES_DB=${DB_NAME:-sample_report_db}
    volumes:
      - postgres-data-prod:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sample_user} -d ${DB_NAME:-sample_report_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sample-report-backend-prod
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-https://yourdomain.com}
      - SQLALCHEMY_DATABASE_URI=postgresql://${DB_USER:-sample_user}:${DB_PASSWORD:-changeme_in_production}@db:5432/${DB_NAME:-sample_report_db}
    volumes:
      - backend-uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-https://yourdomain.com}
    container_name: sample-report-frontend-prod
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data-prod:
    driver: local
  backend-uploads:
    driver: local
