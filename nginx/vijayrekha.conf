server {
    listen 80 default_server;
    server_name _;

    # Backend API - strip /vijayrekha/api prefix, proxy to FastAPI
    location /vijayrekha/api/ {
        proxy_pass http://127.0.0.1:8002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrite ALL redirects from backend to use the correct public path
        proxy_redirect ~^http://[^/]+/(.*)$ https://chinnaboina.com/vijayrekha/api/$1;

        # Support file uploads (NBS reports can be large)
        client_max_body_size 100M;

        # Timeouts for long-running report processing
        proxy_read_timeout 600s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
    }

    # Frontend - strip /vijayrekha/ prefix and proxy to container root
    location /vijayrekha/ {
        proxy_pass http://127.0.0.1:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirect bare /vijayrekha to /vijayrekha/
    location = /vijayrekha {
        return 301 /vijayrekha/;
    }

    # Profile page at root
    location / {
        root /var/www/profile;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
